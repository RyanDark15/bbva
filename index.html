<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>El BBVA te da La bienvenida | BBVA Perú</title>
<link rel="icon" type="image/png" href="img/logo.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --azul:#004481;
    --azul-dark:#072146;
    --gris:#f5f5f5;
    --texto:#1a1a1a;
    --texto2:#666;
    --radius:8px;
}

body{

    font-family:'Segoe UI',Arial,sans-serif;

    background:white;
    color:var(--texto);
}

/* NAVBAR */

.navbar{

    width:100%;
    height:75px;

    background:white;

    display:flex;
    align-items:center;
    gap:30px;

    padding:0 40px;

    border-bottom:1px solid #ddd;

    position:sticky;
    top:0;
    z-index:100;
}

.logo{

    text-decoration:none;

    color:var(--azul);

    font-size:32px;
    font-weight:900;
}

.navbar ul{

    list-style:none;

    display:flex;
    gap:25px;

    flex:1;
}

.navbar ul a{

    text-decoration:none;

    color:#222;

    font-size:14px;
    font-weight:600;
}

.btn-cuenta{

    padding:12px 20px;

    border:2px solid var(--azul);

    border-radius:var(--radius);

    text-decoration:none;

    color:var(--azul);

    font-size:14px;
    font-weight:700;
}

.btn-login{

    padding:12px 20px;

    background:var(--azul);

    color:white;

    border-radius:var(--radius);

    text-decoration:none;

    font-size:14px;
    font-weight:700;
}

/* HERO */

.hero{

    min-height:520px;

    background:var(--gris);

    display:grid;
    grid-template-columns:1fr 1fr;

    gap:50px;

    align-items:center;

    padding:60px;
}

.hero-content{

    max-width:580px;
}

.hero-tag{

    color:var(--texto2);

    font-size:14px;

    margin-bottom:10px;
}

.hero-title{

    font-size:52px;
    font-weight:900;

    color:var(--azul);

    line-height:1.1;

    margin-bottom:20px;
}

.hero-desc{

    font-size:17px;

    line-height:1.7;

    margin-bottom:35px;
}

.hero-buttons{

    display:flex;
    gap:15px;

    flex-wrap:wrap;
}

.btn-primary{

    padding:15px 25px;

    background:var(--azul);

    color:white;

    border-radius:var(--radius);

    text-decoration:none;

    font-weight:700;
}

.btn-outline{

    padding:15px 25px;

    border:2px solid var(--azul);

    color:var(--azul);

    border-radius:var(--radius);

    text-decoration:none;

    font-weight:700;
}

.hero-image{

    width:100%;
    height:430px;

    object-fit:cover;

    border-radius:14px;
}

/* CONTROLS */

.controls{

    display:flex;
    justify-content:center;
    align-items:center;

    gap:20px;

    padding:25px;
}

.controls button{

    width:45px;
    height:45px;

    border:none;
    border-radius:50%;

    background:var(--azul);

    color:white;

    font-size:24px;

    cursor:pointer;
}

.indicator{

    font-size:15px;
    font-weight:700;
}

/* POPUP */

.popup{

    position:fixed;

    right:20px;
    bottom:20px;

    width:280px;

    background:var(--azul);

    color:white;

    padding:22px;

    border-radius:16px;

    box-shadow:0 10px 30px rgba(0,0,0,.25);

    z-index:300;
}

.popup h3{

    margin-bottom:10px;
}

.popup p{

    font-size:14px;

    line-height:1.6;

    margin-bottom:18px;
}

.popup a{

    display:block;

    text-align:center;

    background:white;

    color:var(--azul);

    text-decoration:none;

    padding:12px;

    border-radius:10px;

    font-weight:700;
}

/* RESPONSIVE */

@media(max-width:900px){

    .hero{

        grid-template-columns:1fr;

        padding:30px;
    }

    .hero-title{
        font-size:38px;
    }

    .navbar ul{
        display:none;
    }
}
</style>
</head>
<body>
<!-- NAVBAR -->

<nav class="navbar">
    <a href="#" class="logo">
        BBVA
    </a>
    <ul>
        <li><a href="#">Personas</a></li>
        <li><a href="#">Empresas</a></li>
        <li><a href="#">Tarjetas</a></li>
        <li><a href="#">Préstamos</a></li>
    </ul>
    <a href="#" class="btn-cuenta">
        Abre tu cuenta
    </a>
    <a href="banca.html" class="btn-login">
    Banca por Internet</a>

</nav>

<!-- HERO -->

<section class="hero">

    <div class="hero-content">

        <div class="hero-tag"
             id="hero-tag"></div>

        <h1 class="hero-title"
            id="hero-title"></h1>

        <p class="hero-desc"
           id="hero-desc"></p>

        <div class="hero-buttons">

            <a href="#"
               class="btn-primary"
               id="btn1"></a>

            <a href="#"
               class="btn-outline"
               id="btn2"></a>

        </div>

    </div>

    <img src=""
         alt=""
         class="hero-image"
         id="hero-image">

</section>

<!-- CONTROLS -->

<div class="controls">

    <button type="button" onclick="prevSlide()">
        ‹
    </button>

    <div class="indicator"
         id="indicator"></div>

    <button type="button" onclick="nextSlide()">
        ›
    </button>

</div>

<!-- POPUP -->

<div class="popup">

    <h3>
        ¿Tu SOAT está por vencer?
    </h3>

    <p>
        Evita multas costosas contratándolo a tiempo.
    </p>

    <a href="#">
        Contratar aquí
    </a>

</div>

<script>

const promociones = [

    {
        tag: 'Préstamo Al Toque',
        titulo: '¡Sé 1 de los 40 ganadores con tu Préstamo BBVA!',
        desc: 'Solo por este mes, tu Préstamo BBVA <strong>te premia con hasta S/ 1,000 de cashback y otros premios exclusivos</strong> como smartwatches o sets de ollas y cubiertos Tramontina.',
        btn1: {
            texto: 'Solicitar Préstamo',
            href: '#'
        },
        btn2: {
            texto: 'Proyecta tu Préstamo',
            href: '#'
        },
        imagen: 'img/promo1.jpg'
    },

    {
        tag: 'Cuenta Ahorro',
        titulo: 'Abre tu cuenta y empieza a ganar desde el primer día',
        desc: 'Disfruta de una <strong>tasa preferencial del 4% anual</strong> en soles y accede a todos los beneficios digitales.',
        btn1: {
            texto: 'Abrir Cuenta',
            href: '#'
        },
        btn2: {
            texto: 'Ver Beneficios',
            href: '#'
        },
        imagen: 'img/promo2.jpg'
    },

    {
        tag: 'Tarjeta de Crédito',
        titulo: 'Tu Tarjeta BBVA con hasta 36 cuotas sin intereses',
        desc: 'Compra en tus tiendas favoritas y <strong>paga en cuotas cómodas</strong>. Acumula puntos y canjéalos por premios.',
        btn1: {
            texto: 'Solicitar Tarjeta',
            href: '#'
        },
        btn2: {
            texto: 'Ver Tiendas',
            href: '#'
        },
        imagen: 'img/promo3.jpg'
    },

    {
        tag: 'Seguro Vehicular',
        titulo: 'Protege tu vehículo con el Seguro BBVA',
        desc: 'Contrata tu seguro vehicular y <strong>obtén un mes gratis</strong>. Cobertura total ante accidentes.',
        btn1: {
            texto: 'Contratar Seguro',
            href: '#'
        },
        btn2: {
            texto: 'Ver Coberturas',
            href: '#'
        },
        imagen: 'img/promo4.jpg'
    }

];

let slide = 0;

function renderSlide(index){

    const promo = promociones[index];

    document.getElementById("hero-tag").innerHTML =
        promo.tag;

    document.getElementById("hero-title").innerHTML =
        promo.titulo;

    document.getElementById("hero-desc").innerHTML =
        promo.desc;

    document.getElementById("hero-image").src =
        promo.imagen;

    document.getElementById("hero-image").alt =
        promo.titulo;

    document.getElementById("btn1").innerHTML =
        promo.btn1.texto;

    document.getElementById("btn1").href =
        promo.btn1.href;

    document.getElementById("btn2").innerHTML =
        promo.btn2.texto;

    document.getElementById("btn2").href =
        promo.btn2.href;

    document.getElementById("indicator").innerHTML =
        (index + 1) + " de " + promociones.length;
}

function nextSlide(){

    slide++;

    if(slide >= promociones.length){
        slide = 0;
    }

    renderSlide(slide);
}

function prevSlide(){

    slide--;

    if(slide < 0){
        slide = promociones.length - 1;
    }

    renderSlide(slide);
}

renderSlide(slide);

setInterval(() => {

    nextSlide();

}, 5000);

</script>

</body>
</html>
